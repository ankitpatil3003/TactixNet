<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TactixNet Viewer</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 1rem; }
    h1 { margin: 0 0 0.25rem 0; font-size: 1.3rem; }
    #hud { display: flex; gap: 1.5rem; padding: 0.5rem 0; color: #94a3b8; font-size: 0.9rem; flex-wrap: wrap; }
    #hud b { color: #e2e8f0; }
    #replan { color: #f87171; font-weight: bold; opacity: 0; transition: opacity 0.3s; }
    #replan.flash { opacity: 1; }
    #doctrine-panel { margin-top: 0.5rem; padding: 0.5rem 0.75rem; background: #1e293b; border: 1px solid #334155; border-radius: 6px; font-size: 0.85rem; color: #94a3b8; max-width: 600px; }
    #doctrine-panel b { color: #e2e8f0; }
    canvas { background: #1e293b; border: 1px solid #334155; display: block; margin-top: 0.5rem; }
    #legend { margin-top: 0.5rem; font-size: 0.8rem; color: #94a3b8; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin: 0 4px 0 12px; }
  </style>
</head>
<body>
  <h1>TactixNet Squad Viewer</h1>
  <div id="hud">
    <span>Status: <b id="status">connecting…</b></span>
    <span>Tick: <b id="tick">–</b></span>
    <span>Directive seq: <b id="seq">–</b></span>
    <span>Negotiation latency: <b id="latency">–</b></span>
    <span>Recovery: <b id="recovery">–</b></span>
    <span>Replans: <b id="replans">0</b></span>
    <span id="replan">⚠ REPLAN</span>
    <span id="replay-controls" style="display:none">
      <button id="replay-play">Play</button>
      <label>Speed <input id="replay-speed" type="range" min="1" max="20" value="5" /></label>
    </span>
  </div>
  <div id="doctrine-panel">Doctrine: <b id="doctrine-text">–</b></div>
  <canvas id="grid" width="600" height="600"></canvas>
  <div id="legend">
    Agents:
    <span class="dot" style="background:#4ade80"></span>calm
    <span class="dot" style="background:#facc15"></span>suspicious
    <span class="dot" style="background:#fb923c"></span>alert
    <span class="dot" style="background:#f87171"></span>compromised
    <span class="dot" style="background:#a78bfa"></span>guard (circle = vision range)
  </div>

  <script>
    const DEFAULT_GRID = 20;
    const canvas = document.getElementById('grid');
    const ctx = canvas.getContext('2d');

    const el = (id) => document.getElementById(id);
    const squadId = new URLSearchParams(location.search).get('squad');
    const replayMode = new URLSearchParams(location.search).get('replay') === '1';

    let gridSize = DEFAULT_GRID;
    let scale = canvas.width / gridSize;

    const ALERT_COLORS = {
      CALM: '#4ade80',
      SUSPICIOUS: '#facc15',
      ALERT: '#fb923c',
      COMPROMISED: '#f87171',
    };

    let world = { agents: [], guards: [], tick: 0 };
    let roles = {};
    let replanCount = 0;

    function setGridSize(size) {
      gridSize = size || DEFAULT_GRID;
      scale = canvas.width / gridSize;
    }

    async function loadScenarioMeta() {
      if (!squadId) return;
      try {
        const response = await fetch(`/squads/${squadId}/scenario`);
        if (!response.ok) return;
        const data = await response.json();
        const scenario = data.scenario || {};
        setGridSize(scenario.grid_size || DEFAULT_GRID);
      } catch (_) { /* optional */ }
    }

    function formatDoctrine(doctrine) {
      if (!doctrine) return '–';
      const weights = doctrine.role_weights || {};
      const parts = Object.entries(weights).map(([k, v]) => `${k}:${v}`);
      const objective = doctrine.priority_objective || '–';
      return `${objective} | ${parts.join(', ') || 'default weights'}`;
    }

    function updateDoctrine(message) {
      const doctrine = message.doctrine || message;
      el('doctrine-text').textContent = formatDoctrine(doctrine);
    }

    function drawGrid() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#293548';
      for (let i = 0; i <= gridSize; i++) {
        ctx.beginPath();
        ctx.moveTo(i * scale, 0); ctx.lineTo(i * scale, canvas.height);
        ctx.moveTo(0, i * scale); ctx.lineTo(canvas.width, i * scale);
        ctx.stroke();
      }
    }

    function drawGuards() {
      for (const guard of world.guards) {
        const [x, y] = guard.position;
        ctx.fillStyle = 'rgba(167, 139, 250, 0.12)';
        ctx.beginPath();
        ctx.arc(x * scale, y * scale, (guard.vision_range || 5) * scale, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#a78bfa';
        ctx.beginPath();
        ctx.arc(x * scale, y * scale, 9, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#e2e8f0';
        ctx.font = '10px sans-serif';
        ctx.fillText(guard.id, x * scale - 8, y * scale - 14);
      }
    }

    function drawAgents() {
      for (const agent of world.agents) {
        const [x, y] = agent.position;
        ctx.fillStyle = ALERT_COLORS[agent.alert_level] || '#38bdf8';
        ctx.beginPath();
        ctx.arc(x * scale, y * scale, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#0f172a';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#e2e8f0';
        ctx.font = 'bold 10px sans-serif';
        ctx.fillText(agent.id, x * scale - 7, y * scale + 3);
        const role = roles[agent.id];
        if (role) {
          ctx.fillStyle = '#94a3b8';
          ctx.font = '10px sans-serif';
          ctx.fillText(role, x * scale - 18, y * scale + 22);
        }
      }
    }

    function render() {
      drawGrid();
      drawGuards();
      drawAgents();
    }

    function flashReplan() {
      const badge = el('replan');
      badge.classList.add('flash');
      setTimeout(() => badge.classList.remove('flash'), 1200);
    }

    function handleMessage(message) {
      if (message.type === 'world_snapshot') {
        world = message;
        el('tick').textContent = message.tick;
        render();
      } else if (message.type === 'doctrine') {
        updateDoctrine(message);
      } else if (message.type === 'directive') {
        const directive = message.directive;
        roles = Object.fromEntries(directive.awards.map(a => [a.agent_id, a.role]));
        el('seq').textContent = directive.directive_seq;
        el('latency').textContent = `${message.latency_ms} ms`;
        el('recovery').textContent =
          message.recovery_ms != null ? `${message.recovery_ms} ms` : '–';
        if (message.interrupted) {
          replanCount = message.replan_count;
          el('replans').textContent = replanCount;
          flashReplan();
        }
        render();
      }
    }

    async function startReplay() {
      el('replay-controls').style.display = 'inline';
      el('status').textContent = 'loading replay…';
      await loadScenarioMeta();

      let events = [];
      let truncated = false;
      try {
        const response = await fetch(
          `/squads/${squadId}/events?count=10000&replay_only=true`
        );
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        events = data.events || [];
        truncated = Boolean(data.truncated);
      } catch (err) {
        el('status').textContent = `replay failed: ${err.message}`;
        return;
      }

      if (events.length === 0) {
        el('status').textContent = 'no replay events — run a demo first';
        return;
      }

      let index = 0;
      let playing = false;
      let timerId = null;
      let maxTick = 0;

      function parsePayload(payload) {
        if (typeof payload === 'string') {
          try { return JSON.parse(payload); } catch { return null; }
        }
        return payload;
      }

      function tickFromEntry(entry) {
        const payload = parsePayload(entry.payload);
        if (!payload) return 0;
        if (entry.type === 'world_snapshot') return payload.tick ?? 0;
        if (entry.type === 'directive') return payload.directive?.tick ?? payload.tick ?? 0;
        if (entry.type === 'doctrine') updateDoctrine(payload);
        return 0;
      }

      for (const entry of events) {
        maxTick = Math.max(maxTick, tickFromEntry(entry));
      }

      function applyEvent(entry) {
        const payload = parsePayload(entry.payload);
        if (!payload) return;
        const message = payload.type ? payload : { ...payload, type: entry.type };
        if (message.type === 'world_snapshot' || message.type === 'directive' || message.type === 'doctrine') {
          handleMessage(message);
        }
      }

      function currentTick() {
        const tickText = el('tick').textContent;
        const n = Number(tickText);
        return Number.isFinite(n) ? n : 0;
      }

      function scheduleNext() {
        if (timerId) {
          clearTimeout(timerId);
          timerId = null;
        }
        if (!playing) return;
        if (index >= events.length) {
          playing = false;
          el('replay-play').textContent = 'Play';
          el('status').textContent = `replay finished (tick ${maxTick})`;
          return;
        }
        applyEvent(events[index++]);
        el('status').textContent = `replaying tick ${currentTick()}/${maxTick} (${index}/${events.length})`;
        const speed = Number(el('replay-speed').value) || 5;
        timerId = setTimeout(scheduleNext, 200 / speed);
      }

      el('replay-play').onclick = () => {
        playing = !playing;
        el('replay-play').textContent = playing ? 'Pause' : 'Play';
        if (playing) {
          if (index >= events.length) {
            index = 0;
            el('tick').textContent = '–';
            el('seq').textContent = '–';
            el('latency').textContent = '–';
            el('recovery').textContent = '–';
            replanCount = 0;
            el('replans').textContent = '0';
          }
          scheduleNext();
        } else if (timerId) {
          clearTimeout(timerId);
          timerId = null;
        }
      };

      el('replay-speed').oninput = () => {
        if (playing) scheduleNext();
      };

      const truncNote = truncated ? ' (truncated — increase count)' : '';
      el('status').textContent =
        `replay ready: ${events.length} frames, ticks 1–${maxTick}${truncNote} — press Play`;
    }

    async function connect() {
      if (!squadId) {
        el('status').textContent = 'add ?squad=<squad-id> to the URL';
        render();
        return;
      }
      await loadScenarioMeta();
      if (replayMode) {
        startReplay();
        return;
      }
      const ws = new WebSocket(`ws://${location.host}/ws/squads/${squadId}?mode=observer`);
      ws.onopen = () => { el('status').textContent = `observing ${squadId.slice(0, 8)}…`; };
      ws.onclose = () => {
        el('status').textContent = 'disconnected — retrying in 2s';
        setTimeout(connect, 2000);
      };
      ws.onmessage = (event) => {
        handleMessage(JSON.parse(event.data));
      };
    }

    render();
    connect();
  </script>
</body>
</html>
