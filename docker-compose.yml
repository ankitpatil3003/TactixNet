services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  engine:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m engine.runner
    environment:
      REDIS_URL: redis://redis:6379/0
      ENGINE_MODE: distributed
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ENGINE_LOG_LEVEL: ${ENGINE_LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,time,redis; c=redis.from_url(os.environ['REDIS_URL']); v=c.get('tactixnet:engine:heartbeat'); exit(0 if v and time.time()-float(v)<30 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn gateway.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      ENGINE_MODE: distributed
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
      engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
